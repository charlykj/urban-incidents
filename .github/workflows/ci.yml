name: CI - Urban Incidents

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    name: 🧪 Tests Backend (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        working-directory: ./backend
        run: pip install -r requirements.txt

      - name: Correr pruebas con pytest
        working-directory: ./backend
        run: pytest tests/ -v

  build-docker:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: test-backend

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t urban-incidents-backend ./backend

      - name: Build frontend image
        run: docker build -t urban-incidents-frontend ./frontend

  integration-test:
    name: 🔗 Test Integración con DynamoDB Local
    runs-on: ubuntu-latest
    needs: build-docker

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Levantar servicios con docker-compose
        run: docker compose up -d

      - name: Esperar que backend esté listo
        run: |
          echo "Esperando backend..."
          for i in {1..15}; do
            curl -sf http://localhost:8080/ && break
            sleep 3
          done

      - name: Verificar endpoint raíz
        run: curl -sf http://localhost:8080/ | grep "ok"

      - name: Verificar endpoint incidentes
        run: curl -sf http://localhost:8080/incidents/

      - name: Apagar servicios
        run: docker compose down